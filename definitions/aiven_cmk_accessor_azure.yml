# yaml-language-server: $schema=.schema.yml
location: internal/plugin/service/cmk/accessor/azure
datasource:
  description: |
    Gets the Azure CMK accessor for an Aiven project.
    The accessor is used to authenticate Aiven to your Azure Key Vault.
clientHandler: cmk
idAttributeComposed: [project]
operations:
  - id: CMKAccessorsList
    type: read
    resultKey: accessors/azure
    resultKeyField: Azure
schema:
  app_id:
    description: The Azure application ID that Aiven uses to access your Key Vault.
