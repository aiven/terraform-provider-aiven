# yaml-language-server: $schema=.schema.yml
location: internal/plugin/service/cmk/accessor/aws
datasource:
  description: |
    Gets the AWS CMK accessor for an Aiven project.
    The accessor is used to authenticate Aiven to your AWS Key Management Service (KMS).
clientHandler: cmk
idAttributeComposed: [project]
operations:
  - id: CMKAccessorsList
    type: read
    resultKey: accessors/aws
    resultKeyField: AWS
schema:
  principal:
    description: The AWS IAM principal ARN that Aiven uses to access your KMS key.
