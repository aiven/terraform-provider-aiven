# yaml-language-server: $schema=.schema.yml
location: internal/plugin/service/cmk/accessor/oci
datasource:
  description: |
    Gets the OCI CMK accessor for an Aiven project.
    The accessor is used to authenticate Aiven to your Oracle Cloud Infrastructure (OCI) Vault.
clientHandler: cmk
idAttributeComposed: [project]
operations:
  - id: CMKAccessorsList
    type: read
    resultKey: accessors/oci
    resultKeyField: Oci
schema:
  access_group:
    description: The OCI access group that Aiven uses to access your OCI Vault key.
  access_tenant:
    description: The OCI access tenant that Aiven uses to access your OCI Vault key.
